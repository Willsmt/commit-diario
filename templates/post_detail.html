{% extends 'base.html' %}

{% block title %}{{ post.title }} | Repositório de Estudos{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row">
      
    <div class="col-lg-8 mb-4">
        
      <article class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
            
          <h1 class="card-title fw-bold mb-3">{{ post.title }}</h1>
          
          <p class="text-muted small mb-4 border-bottom pb-3">
            Escrito por <strong>{{ post.author }}</strong> em {{ post.created_on|date:"d/m/Y \à\s H:i" }}
          </p>
          
          <div class="card-text text-break lh-lg text-secondary">
            {{ post.content|safe }}
          </div>
          
        </div>
      </article>
    </div>

    <aside class="col-lg-4">
      {% include 'sidebar.html' %}
    </aside>
    
  </div>
</div>
{% endblock content %}
