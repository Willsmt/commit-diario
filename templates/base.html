{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Repositório central de estudos em Django.{% endblock %}">
    
    <title>{% block title %}Django Central - EBAC{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm" id="mainNav">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="{% url 'blog:index' %}">Django Central</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-dark fw-semibold" href="#">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link text-dark fw-semibold" href="#">Política</a></li>
                    <li class="nav-item"><a class="nav-link text-dark fw-semibold" href="#">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="py-3 bg-white border-top mt-auto">
        <p class="m-0 text-secondary text-center">Backend Python - EBAC &copy; {% now "Y" %}</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
